{{ define "main" }}
<div class="page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}
  </header>

  <div class="post-list">
    {{ range .Pages }}
    <article class="post-item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <time>{{ .Date.Format "2 January 2006" }}</time>
      {{ with .Params.author }}<span class="author">by {{ . }}</span>{{ end }}
      <p>{{ .Summary }}</p>
      <a href="{{ .RelPermalink }}">Read more →</a>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
